<article class="work-card">
  <a href="{{ .RelPermalink }}" class="work-card__link">
    {{ with .Params.featured_image }}
      <img class="work-card__image" src="{{ . | relURL }}" alt="{{ $.Title }}" loading="lazy">
    {{ else }}
      <span class="work-card__monogram" aria-hidden="true">{{ substr .Title 0 1 }}</span>
    {{ end }}
    <span class="work-card__body">
      <span class="work-card__type">{{ .Type | humanize }}</span>
      <span class="work-card__title">{{ .Title }}</span>
      {{ with .Description }}<span class="work-card__description">{{ . }}</span>{{ end }}
      <span class="work-card__meta">
        {{ if not .Date.IsZero }}{{ .Date.Format "Jan 2, 2006" }}{{ end }}
      </span>
    </span>
  </a>
</article>
